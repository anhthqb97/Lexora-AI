name: E2E

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    name: e2e-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start MongoDB and Redis
        run: docker compose up -d mongodb redis

      - name: Wait for services
        run: npm run local:wait

      - name: Build application
        run: npm run build
        env:
          MONGODB_URI: mongodb://localhost:27017/lexora-e2e
          AUTH_SECRET: e2e-test-secret-min-32-characters-long
          JWT_SECRET: e2e-test-secret-min-32-characters-long
          UPSTASH_REDIS_REST_URL: http://localhost:6379
          UPSTASH_REDIS_REST_TOKEN: local

      - name: Run E2E smoke tests
        run: npm run test:e2e:smoke
        env:
          MONGODB_URI: mongodb://localhost:27017/lexora-e2e
          AUTH_SECRET: e2e-test-secret-min-32-characters-long
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  e2e-full:
    name: e2e-full
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: e2e-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run full E2E suite
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.STAGING_URL || 'http://localhost:3000' }}
          CI: true
        continue-on-error: true
